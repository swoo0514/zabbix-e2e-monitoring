# Zabbix E2E 모니터링 스택 — 요구 서비스 5종 + Browser Item 필수 selenium.
# 외부 공개 포트는 Zabbix Web UI(8080) 하나뿐, 나머지는 zabbix-net 내부 통신.
# 이미지는 전부 풀 버전 고정(:latest 미사용).

services:
  postgres:
    image: postgres:16.14-alpine
    container_name: zbx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0.27
    container_name: zbx-server
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ZBX_STARTBROWSERPOLLERS: 1               # 0이면 Browser Item 동작 안 함(요구사항 compose에 없던 누락 함정)
      ZBX_WEBDRIVERURL: http://selenium:4444
      # HA 활성화는 .env에서(ZBX_HANODENAME1 등). HANodeName 빈값=standalone(공식).
      # NodeAddress 기본값 localhost:10051은 컨테이너에서 자기 자신 → 반드시 서비스명으로 override.
      ZBX_HANODENAME: ${ZBX_HANODENAME1:-}
      ZBX_NODEADDRESS: ${ZBX_NODEADDRESS1:-}
      # 부하 실험 통제 knob — .env 미설정이면 공식 기본값(16M/4) = 검증 스택 무변경.
      ZBX_HISTORYCACHESIZE: ${ZBX_HISTORYCACHESIZE:-16M}
      ZBX_STARTDBSYNCERS: ${ZBX_STARTDBSYNCERS:-4}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zabbix-net

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0.27
    container_name: zbx-web
    restart: unless-stopped
    environment:
      # HA에선 프론트에 서버 주소가 비어 있어야 DB nodes 테이블로 active를 자동감지(공식).
      # `-`(콜론 없음) 문법: .env에서 빈 값을 주면 빈 채로 전달, 변수가 없으면 zabbix-server(standalone).
      ZBX_SERVER_HOST: ${ZBX_WEB_SERVER_HOST-zabbix-server}
      DB_SERVER_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PHP_TZ: ${PHP_TZ}
      ZBX_SERVER_NAME: ${ZBX_SERVER_NAME}
    ports:
      - "8080:8080"                            # 유일한 외부 공개 포트
    depends_on:
      postgres:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    networks:
      - zabbix-net

  zabbix-agent2:
    image: zabbix/zabbix-agent2:alpine-7.0.27
    container_name: zbx-agent2
    restart: unless-stopped
    environment:
      ZBX_SERVER_HOST: "zabbix-server,zabbix-server-2"   # 패시브 허용 목록 — HA 노드는 쉼표 나열(standalone에서도 무해)
      ZBX_HOSTNAME: "Zabbix server"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
        # :ro는 소켓 파일 쓰기만 막고 Docker API 호출은 제한 못 함(사실상 호스트 root 동급).
        # 단독 실습 VM + agent2 외부 미노출 전제로 수용. 실무 대안: docker-socket-proxy.
    group_add:
      - "988"                                  # 호스트 docker 그룹 GID — 비특권 zabbix 유저의 소켓 접근용
    depends_on:
      zabbix-server:
        condition: service_started
    networks:
      - zabbix-net

  selenium:
    image: selenium/standalone-chrome:149.0-20260606
    container_name: zbx-selenium
    restart: unless-stopped
    shm_size: "2gb"                            # Chrome은 기본 /dev/shm(64MB)에서 크래시 — 확대 필수
    volumes:
      - ./testdata:/testdata:ro                # Browser Item 미디어 업로드 fixture
    networks:
      - zabbix-net

  nginx:
    image: nginx:1.31-alpine
    container_name: zbx-nginx-app
    restart: unless-stopped
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro    # 마운트 시 이미지 기본 default.conf 대체
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/auth:/etc/nginx/auth:ro
    networks:
      - zabbix-net

  # Zabbix Proxy — 데이터 평면 실험용. profile 격리로 평시 미기동.
  # 제거는 rm -sf zabbix-proxy (주의: --profile ... down은 기본 서비스까지 내림)
  zabbix-proxy:
    image: zabbix/zabbix-proxy-sqlite3:alpine-7.0.27  # proxy는 server와 major 일치 필수. sqlite3=내장 버퍼 DB(분리 오류 지점 제거)
    profiles: ["proxy"]
    container_name: zbx-proxy
    restart: unless-stopped
    environment:
      ZBX_PROXYMODE: 0                     # Active — 프록시→서버 아웃바운드 1개(원격지 인바운드 개방 불필요)
      ZBX_HOSTNAME: proxy-01               # 서버 UI/API 등록 이름과 대소문자까지 일치 필수
      # Active 프록시의 HA 노드 나열은 세미콜론(Server=node1;node2. 쉼표는 패시브용).
      ZBX_SERVER_HOST: ${ZBX_PROXY_SERVER_LIST:-zabbix-server}
      ZBX_STARTBROWSERPOLLERS: 1           # nginx 이관 시 Browser 아이템도 프록시가 실행 — 미러 필수
      ZBX_WEBDRIVERURL: http://selenium:4444  # 기본값 없음 — 미설정 시 browser 아이템 unsupported
      ZBX_PROXYBUFFERMODE: hybrid          # 기본 disk. 평시 메모리 속도 + 초과/서버다운 시 디스크 폴백
      ZBX_PROXYMEMORYBUFFERSIZE: 16M       # hybrid/memory 시 필수(기본 0=비활성)
    networks:
      - zabbix-net
    # sqlite 볼륨 미장착 — 실험 정지 대상은 서버이지 프록시가 아니므로 버퍼 영속성 불필요(트레이드오프 문서화).

  # Zabbix Server node2 — HA standby 실험용. profile 격리로 평시 미기동.
  zabbix-server-2:
    image: zabbix/zabbix-server-pgsql:alpine-7.0.27
    container_name: zbx-server-2
    profiles: ["ha"]
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: postgres            # node1과 같은 DB 공유 — HA의 요체이자 잔존 SPOF
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ZBX_HANODENAME: node2               # 미지정 시 standalone으로 떠서 클러스터 미조인
      ZBX_NODEADDRESS: zabbix-server-2:10051  # localhost 금지(기본값 함정)
      ZBX_STARTBROWSERPOLLERS: 1          # node1 미러 — 인계 후에도 Browser Item이 살아 있으려면 필수
      ZBX_WEBDRIVERURL: http://selenium:4444
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zabbix-net

volumes:
  pgsql-data:

networks:
  zabbix-net:
    driver: bridge
