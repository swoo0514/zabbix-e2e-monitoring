# =============================================================================
# Zabbix E2E 모니터링 스택 (단일 VM / Docker Compose)
#
# 설계 원칙: 요구사항서가 명시한 서비스(server·web·agent2·postgres·nginx) +
#            Browser Item에 필수인 selenium(WebDriver)만 포함한 "최소 구성".
# 노출 정책: 외부에는 Zabbix Web UI(8080)만 공개. 나머지는 내부 브리지 네트워크
#            (zabbix-net)로만 통신 → 요구사항 2.3 "8080 제외 외부 차단" 준수.
#
# ※ compose 'version:' 키는 Compose Spec에서 폐기(deprecated)되어 생략함.
#    (공식 문서: docker compose는 더 이상 version 필드를 사용하지 않음)
# ※ 모든 이미지는 재현성을 위해 풀 버전 고정(:latest 미사용). 업그레이드는 의도적으로만 수행.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # 1) PostgreSQL — Zabbix 데이터/설정 저장소
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.14-alpine       # 요구 15.x↑ 충족, Zabbix 7.0 지원범위(≤16). 패치 고정. alpine=경량.
    container_name: zbx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}          # 공식 postgres 이미지 표준 변수. 값은 .env로 분리.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgsql-data:/var/lib/postgresql/data    # DB 영속화. 컨테이너 재생성에도 데이터 유지.
    networks:
      - zabbix-net
    # 외부 포트 미공개(요구 2.3: PostgreSQL 외부 오픈 금지). 내부에서 hostname 'postgres'로 접근.
    healthcheck:                                # 서버가 DB 준비 전 기동해 실패하는 것을 방지(depends_on과 연계)
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 2) Zabbix Server — 수집·트리거 계산·알림의 중앙 두뇌
  # ---------------------------------------------------------------------------
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0.27  # 7.0 LTS 최신 패치 고정(요구 "7.x LTS"). pgsql=PostgreSQL 백엔드.
    container_name: zbx-server
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: postgres                 # DB 컨테이너 서비스명으로 접속(공식 zabbix-docker 변수).
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # --- Browser Item 필수 설정 (공식 확인: 둘 다 Zabbix 7.0.0부터) ---
      ZBX_STARTBROWSERPOLLERS: 1               # 브라우저 폴러 인스턴스 수. 0이면 Browser Item 동작 안 함.
      ZBX_WEBDRIVERURL: http://selenium:4444   # WebDriver 엔드포인트. selenium 서비스(4444)를 가리킴.
      # --- [ACT1 부하/유실 실험] 캐시 유실 재현용 실험 통제 (평소엔 기본값 = 검증스택 무변경) ---
      #  무엇: 히스토리 쓰기 캐시 크기. 공식 Range 128K-2G / Default 16M
      #        (raw conf: git.zabbix.com .../conf/zabbix_server.conf release/7.0)
      #  판단: .env 미설정이면 16M(공식 기본) 그대로. Act1 실험 시에만 .env에서 128K(문서상 최소)로 축소해
      #        랩 스케일 버스트로 오버플로 도달. 실험 통제이지 생산 사이징 권고가 아님.
      #  대안/기각: DB를 직접 스로틀(cgroup/tc) → 재현·롤백 복잡. 캐시 env 축소가 가장 깨끗하고 되돌리기 쉬움.
      ZBX_HISTORYCACHESIZE: ${ZBX_HISTORYCACHESIZE:-16M}
      #  무엇: history syncer(DB 배수) 인스턴스 수. 공식 Range 1-100 / Default 4
      #  판단: 미설정이면 4. Act1에서만 1로 낮춰 배수를 느리게 → 유실 임계를 선명화. 최소값이라 유효.
      ZBX_STARTDBSYNCERS: ${ZBX_STARTDBSYNCERS:-4}
    depends_on:
      postgres:
        condition: service_healthy             # DB가 healthy가 된 뒤에 기동(스키마 초기화 안정성).
    networks:
      - zabbix-net
    # 10051은 외부 미공개(요구 2.3). agent2가 같은 네트워크 내부에서 접속.

  # ---------------------------------------------------------------------------
  # 3) Zabbix Web Frontend — 관리/대시보드 UI (외부 공개 대상)
  #    ※ 이 서비스는 내부적으로 nginx를 쓰지만 "모니터링 대상 nginx"와 별개임.
  # ---------------------------------------------------------------------------
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0.27  # nginx+php 프론트엔드, PostgreSQL 연동판. 서버와 동일 패치.
    container_name: zbx-web
    restart: unless-stopped
    environment:
      ZBX_SERVER_HOST: zabbix-server           # UI가 데이터를 가져올 Zabbix Server 위치.
      DB_SERVER_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PHP_TZ: ${PHP_TZ}                         # PHP 타임존. 그래프/로그 시간 표시 정확성.
      ZBX_SERVER_NAME: ${ZBX_SERVER_NAME}       # UI 상단에 표시될 설치 이름.
    ports:
      - "8080:8080"                            # ★ 유일하게 외부 공개하는 포트(관리자 Web 접속).
    depends_on:
      postgres:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    networks:
      - zabbix-net

  # ---------------------------------------------------------------------------
  # 4) Zabbix Agent 2 — 호스트/서버 메트릭 수집 에이전트
  # ---------------------------------------------------------------------------
  zabbix-agent2:
    image: zabbix/zabbix-agent2:alpine-7.0.27  # 서버와 동일 패치로 고정.
    container_name: zbx-agent2
    restart: unless-stopped
    environment:
      ZBX_SERVER_HOST: zabbix-server           # Passive 수집 시 이 서버의 접속을 허용.
      ZBX_HOSTNAME: "Zabbix server"            # Zabbix 기본 호스트명과 매칭(UI 기본 호스트 인터페이스를 이 컨테이너로 지정 예정).
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Agent2 Docker 플러그인(컨테이너별 CPU/메모리 LLD)용.
        # ★ 보안 트레이드오프: :ro는 소켓 "파일"의 쓰기만 막고 Docker API 호출은 제한하지 못함
        #   → 소켓 접근 = 사실상 호스트 root 동급. 단독 실습 VM + agent2 외부 미노출이라 수용.
        #   실무 대안: docker-socket-proxy(GET만 허용)·cAdvisor 등 전용 exporter.
    group_add:
      - "988"                                  # 호스트 docker 그룹 GID(stat -c '%g' /var/run/docker.sock).
                                               # agent2는 비특권 zabbix 유저로 돌므로 이 그룹을 부여해야 소켓 접근 가능.
    depends_on:
      zabbix-server:
        condition: service_started
    networks:
      - zabbix-net
    # 10050 외부 미공개. server가 내부에서 zabbix-agent2:10050으로 접속.

  # ---------------------------------------------------------------------------
  # 5) Selenium (standalone-chrome) — Browser Item용 WebDriver
  # ---------------------------------------------------------------------------
  selenium:
    image: selenium/standalone-chrome:149.0-20260606  # WebDriver+Chrome 일체형(빌드 고정). ZBX_WEBDRIVERURL이 가리킴.
    container_name: zbx-selenium
    restart: unless-stopped
    shm_size: "2gb"                            # ★ Chrome은 기본 /dev/shm(64MB)에서 크래시. 공유메모리 확대 필수.
    volumes:
      - ./testdata:/testdata:ro                # Browser Item 미디어 업로드 테스트용(파일 input에 /testdata/... 경로 전달)
    networks:
      - zabbix-net
    # 4444(WebDriver)는 내부 전용. 디버깅용 noVNC(7900)를 보고 싶으면 임시로 "7900:7900" 추가 가능.

  # ---------------------------------------------------------------------------
  # 6) nginx 샘플 앱 — Web Scenario의 "모니터링 대상" (산출물 3)
  #    ※ conf.d/html을 bind mount해 /(메인)·/health(200+OK)·/status(stub_status) 제공.
  #       conf.d 마운트 시 이미지 기본 default.conf는 대체됨.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.31-alpine                   # 요구 1.24↑ 충족(mainline). 모니터링 대상 샘플.
    container_name: zbx-nginx-app
    restart: unless-stopped
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro    # 서버 설정(bind mount, 읽기전용). 기본 default.conf 대체.
      - ./nginx/html:/usr/share/nginx/html:ro  # 정적 콘텐츠(메인 페이지). Required String 포함.
      - ./nginx/auth:/etc/nginx/auth:ro        # Basic Auth 자격 파일(.htpasswd). /secure 보호용(고도화).
    networks:
      - zabbix-net
    # 외부 포트 미공개(요구 2.3: 8080 외 차단). Zabbix Server가 내부에서 http://nginx/ 로 접근.

  # [ACT1 부하/유실 실험] 버스트 발생기:
  #   공식 zabbix/zabbix-sender 독립 이미지는 없음 → 이미 떠 있는 zbx-agent2에 zabbix_sender가
  #   번들(/usr/bin/zabbix_sender)돼 있어 그걸로 쏜다. 별도 서비스 불필요.
  #     docker exec zbx-agent2 zabbix_sender -z zabbix-server -i <입력파일>
  #   sender의 -s(호스트)로 대상(burst-lab)을 지정하므로 발신 컨테이너는 무관.

# -----------------------------------------------------------------------------
volumes:
  pgsql-data:                                  # PostgreSQL 데이터 영속 볼륨

networks:
  zabbix-net:                                  # 모든 컴포넌트가 붙는 단일 사용자 정의 브리지.
    driver: bridge                             # 서비스명(예: postgres, selenium, nginx)으로 DNS 해석됨.
