# nginx 샘플 앱 — Web Scenario 3-Step 모니터링 대상

server_tokens off;

# $http_user_agent: Web Scenario의 Agent(Zabbix-Monitor/1.0)가 접근 로그에서 식별되게 함
log_format mon '$remote_addr [$time_local] "$request" $status ${request_time}s "$http_user_agent"';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log mon;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        SAMEORIGIN always;

    # Step 1: main — Required String "Welcome to nginx"
    location / {
        root  /usr/share/nginx/html;
        index index.html;
    }

    # Step 2: health — 200 + "OK"
    location = /health {
        access_log   off;
        default_type text/plain;
        return       200 "OK";
    }

    # Step 3: status — stub_status (하드닝 옵션: allow <모니터링망>; deny all;)
    location = /status {
        stub_status;
        access_log off;
    }

    # 인증 엔드포인트(고도화) — Basic Auth 보호
    location = /secure {
        auth_basic           "Zabbix E2E Secure Area";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
        # return을 쓰면 rewrite 단계에서 즉시 종료돼 auth_basic(access 단계)을 건너뜀(인증 무력화).
        # alias 실파일 서빙으로 access 단계를 거치게 함. 보호 파일은 webroot 밖에 둠.
        alias /etc/nginx/auth/secure.txt;
    }

    # fault injection — web.test.rspcode <> 200 트리거 재현용
    location = /fail {
        access_log   off;
        default_type text/plain;
        return       500 "INJECTED 500";
    }
}
