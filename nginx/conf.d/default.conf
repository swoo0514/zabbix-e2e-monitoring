# =============================================================================
# nginx 샘플 앱 — Web Scenario 3-Step의 "모니터링 대상" (산출물 3)
# compose에서 /etc/nginx/conf.d 로 bind mount → 이미지 기본 default.conf 대체.
# =============================================================================

server {
    listen 80;                  # 80포트 수신. 외부 미공개, Zabbix Server가 내부망에서 http://nginx/ 로 접근.
    server_name _;              # 모든 Host 헤더 수용(특정 도메인 불필요).

    # [Step 1] 메인 페이지 — Web Scenario Required String 검증 대상
    location / {
        root  /usr/share/nginx/html;   # 정적 콘텐츠 루트(bind mount된 ./nginx/html).
        index index.html;
    }

    # [Step 2] 헬스 체크 — HTTP 200 + 본문 "OK" (요구 4.2)
    location = /health {               # '=' 정확 매칭(가장 빠른 매칭, 다른 location보다 우선).
        access_log    off;            # 헬스체크 트래픽으로 access 로그가 오염되지 않게.
        default_type  text/plain;     # 본문 Content-Type 지정.
        return        200 "OK";       # 상태코드 200 + 본문 "OK".
    }

    # [Step 3] 상태 — nginx 내장 stub_status(연결 통계). 200 반환, 매우 가벼워 응답시간 조건(≤3000ms)에 적합.
    location = /status {
        stub_status;
        access_log off;
        # 운영에선 모니터링 IP만 allow/deny로 제한 권장. 지금은 내부 네트워크 전용이라 생략.
    }
}
