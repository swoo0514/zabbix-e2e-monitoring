# =============================================================================
# nginx 샘플 앱 — Web Scenario 3-Step의 "모니터링 대상" (산출물 3) + 고도화
# compose에서 /etc/nginx/conf.d 로 bind mount → 이미지 기본 default.conf 대체.
# =============================================================================

# [보안] Server 헤더/에러페이지의 버전 노출 제거("nginx/1.31.2" → "nginx"). 정보 노출 최소화.
server_tokens off;

# [로깅] 커스텀 포맷 — 응답시간($request_time)을 포함해 느린 요청을 로그로 관측.
#  http 컨텍스트: conf.d/*.conf 는 nginx.conf의 http{} 안에 include되므로 여기서 log_format 정의 가능.
log_format mon '$remote_addr [$time_local] "$request" $status ${request_time}s';

server {
    listen 80;                   # 80 수신. 외부 미공개, Zabbix Server가 내부망에서 http://nginx/ 로 접근.
    server_name _;               # 모든 Host 헤더 수용.

    access_log /var/log/nginx/access.log mon;   # mon 포맷. 경로는 이미지가 /dev/stdout 심볼릭 → docker logs.

    # [보안] 기본 보안 헤더(하위 location이 자체 add_header를 안 두면 상속됨).
    add_header X-Content-Type-Options nosniff always;   # MIME 스니핑 차단
    add_header X-Frame-Options        SAMEORIGIN always; # 클릭재킹 완화

    # [Step 1] 메인 페이지 — Required String 검증 대상
    location / {
        root  /usr/share/nginx/html;   # bind mount된 ./nginx/html
        index index.html;
    }

    # [Step 2] 헬스 체크 — HTTP 200 + 본문 "OK" (요구 4.2)
    location = /health {               # '=' 정확 매칭(최우선)
        access_log   off;
        default_type text/plain;
        return       200 "OK";
    }

    # [Step 3] 상태 — nginx 내장 stub_status(연결 통계). 200·경량.
    location = /status {
        stub_status;
        access_log off;
        # 내부 전용. 하드닝 옵션: allow <모니터링망>; deny all;
    }

    # --- 고도화: 인증된 엔드포인트 모니터링 (요구 4.1의 "필요 시 Basic Auth 옵션") ---
    # 필수 3-Step은 인증 없이 두고, 별도 /secure만 Basic Auth로 보호.
    # Day 2에서 Web Scenario Authentication으로 자격 전달 → "인증 모니터링" 시연.
    location = /secure {
        auth_basic           "Zabbix E2E Secure Area";   # 401 요구 → 인증 필요
        auth_basic_user_file /etc/nginx/auth/.htpasswd;   # 데모 계정: monitor / monitor_pw
        default_type text/plain;
        return       200 "SECURE OK";
    }

    # --- Fault injection (Trigger 재현 / 장애 테스트용) ---
    # [응답코드 비정상 재현] 의도적 500 → web.test.rspcode <> 200 Trigger 테스트.
    location = /fail {
        access_log   off;
        default_type text/plain;
        return       500 "INJECTED 500";
    }
    # ※ "응답시간 초과"는 순수 nginx로 고정 지연 불가(sleep 미지원).
    #    → 데모 시 Trigger 임계값 일시 하향, 또는 큰 파일+limit_rate 엔드포인트 별도 구성(고도화).
}
